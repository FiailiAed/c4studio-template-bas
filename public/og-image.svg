<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="white" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow accent -->
  <circle cx="1050" cy="100" r="300" fill="#2563eb" opacity="0.07"/>
  <!-- Wordmark -->
  <text x="600" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    c4studio
  </text>
  <!-- Tagline -->
  <text x="600" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" fill="#94a3b8" text-anchor="middle" letter-spacing="0">
    Basic / Bad Ass Astro Setup
  </text>
  <!-- Bottom rule -->
  <line x1="480" y1="400" x2="720" y2="400" stroke="#334155" stroke-width="1"/>
  <!-- URL hint -->
  <text x="600" y="432" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="#475569" text-anchor="middle">
    Replace with a real 1200×630 PNG for production
  </text>
</svg>
